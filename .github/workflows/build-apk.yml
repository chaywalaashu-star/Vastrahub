name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Save lib files
        run: |
          mkdir -p /tmp/bk
          cp lib/main.dart /tmp/bk/
          cp lib/backend.dart /tmp/bk/
          cp pubspec.yaml /tmp/bk/
      - name: Generate android folder
        run: flutter create . --platforms android --org com.clothing.manager
      - name: Restore files
        run: |
          cp /tmp/bk/main.dart lib/main.dart
          cp /tmp/bk/backend.dart lib/backend.dart
          cp /tmp/bk/pubspec.yaml pubspec.yaml
      - run: flutter pub get
      - run: flutter build apk --release --no-shrink
      - uses: actions/upload-artifact@v4
        with:
          name: clothing-manager-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
