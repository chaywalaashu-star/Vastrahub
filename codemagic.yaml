workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze (warnings allowed)
        script: flutter analyze --no-fatal-infos --no-fatal-warnings || true
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
