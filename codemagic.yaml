workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: 3.27.0
      java: 17
    scripts:
      - name: Save files
        script: |
          mkdir -p /tmp/bk
          cp lib/main.dart /tmp/bk/
          cp lib/backend.dart /tmp/bk/
          cp pubspec.yaml /tmp/bk/

      - name: Generate android folder
        script: |
          flutter create /tmp/new_project --platforms android --org com.clothing.manager
          cp -r /tmp/new_project/android ./android

      - name: Fix Kotlin version
        script: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "[0-9.]*"/id "org.jetbrains.kotlin.android" version "2.0.21"/' android/settings.gradle

      - name: Add INTERNET permission
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>/' $MANIFEST
          echo "Manifest after fix:"
          cat $MANIFEST

      - name: Restore files
        script: |
          cp /tmp/bk/main.dart lib/main.dart
          cp /tmp/bk/backend.dart lib/backend.dart
          cp /tmp/bk/pubspec.yaml pubspec.yaml

      - name: Get packages
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release --no-shrink

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
